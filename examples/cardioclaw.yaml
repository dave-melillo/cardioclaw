# CardioClaw Configuration Example
# Docs: https://github.com/dave-melillo/cardioclaw
#
# This is an example configuration showing the heartbeat format.
# Adjust schedules, prompts, and delivery targets to match your setup.

heartbeats:
  # Daily morning briefing
  - name: Morning Briefing
    schedule: 0 8 * * *
    prompt: |
      Run morning briefing: weather + calendar + inbox.
      Keep it under 6 sentences.
    delivery: telegram

  # Evening wrap-up (weekdays only)
  - name: Evening Wrap-up
    schedule: 0 19 * * 1-5
    prompt: "Evening wrap: what got done today, what's tomorrow"
    delivery: telegram

  # One-shot reminder (runs once at specific time)
  - name: Gym Reminder
    schedule: at 2026-12-15 18:00
    message: "Reminder: Gym at 6 PM! 🏋️"
    sessionTarget: main
    delivery: telegram

  # Health check (every 2 hours, no delivery)
  - name: Session Health Check
    schedule: 0 */2 * * *
    prompt: Check session health. Only alert if context over 80%.
    delivery: none
    sessionTarget: isolated

  # Weekly review (Fridays at 5 PM)
  - name: Weekly Review
    schedule: 0 17 * * 5
    prompt: |
      Weekly review:
      - What got done this week?
      - What's priority for next week?
      - Any blockers or risks?
    delivery: telegram
    model: opus

  # Automated sync task (every 30 minutes)
  - name: Trello Sync
    schedule: "*/30 * * * *"
    prompt: "Run Trello sync: node ~/scripts/trello-sync.js"
    model: openrouter/moonshotai/kimi-k2.5

  # Stretch reminder (every 2 hours)
  - name: Stretch Reminder
    schedule: 0 */2 * * *
    message: 🧘 Time to stretch! Stand up, roll those shoulders.
    sessionTarget: main

  # Weekly security audit (Saturdays at 10 AM)
  - name: Weekly Security Review
    schedule: 0 10 * * 6
    message: >-
      Weekly security review time. Run checklist:
      1) Check file permissions
      2) Review Tailscale status
      3) Check gateway logs
    sessionTarget: main

  # Monthly cleanup (first Sunday of month at 3 AM)
  - name: Monthly VPS Cleanup
    schedule: 0 3 1-7 * 0
    prompt: |-
      Run monthly cleanup script: bash ~/scripts/monthly-cleanup.sh

      Report:
      - How much space was freed
      - Before/after disk usage
    model: openrouter/moonshotai/kimi-k2.5
    delivery: telegram
